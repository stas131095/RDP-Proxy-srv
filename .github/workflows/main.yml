name: RDP + Proxy

on:
  workflow_dispatch:

jobs:
  secure-rdp-proxy:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale" -ErrorAction SilentlyContinue
          netsh advfirewall firewall delete rule name="Proxy-HTTP-Tailscale" -ErrorAction SilentlyContinue
          netsh advfirewall firewall delete rule name="Proxy-SOCKS-Tailscale" -ErrorAction SilentlyContinue
          
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force
          Write-Host "RDP configured successfully"

      - name: Create RDP User with Passphrase Password
        run: |
          $wordList = @('Apple','River','Mountain','Forest','Ocean','Sky','Cloud','Storm','Thunder','Lightning','Sunshine','Moonlight','Starlight','Crystal','Diamond','Silver','Golden','Copper','Iron','Steel','Phoenix','Dragon','Eagle','Wolf','Tiger','Bear','Falcon','Hawk','Raven','Maple','Cedar','Pine','Birch','Willow','Aspen','Cherry','Blossom','Meadow','Valley','Canyon','Summit','Horizon','Sunrise','Sunset','Midnight','Noon','Dawn','Dusk','Spring','Summer','Autumn','Winter','Happy','Swift','Brave','Calm','Bright','Sharp','Smooth','Quick','Noble','Wise','Kind','Bold','Fierce','Gentle','Strong','Pure')
          $passphraseWords = Get-Random -InputObject $wordList -Count 4
          $password = ($passphraseWords -join '-') + (Get-Random -Minimum 10 -Maximum 99) + (Get-Random -InputObject ('!','@','#','$','%','&'))
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) { Remove-LocalUser -Name "RDP" -ErrorAction SilentlyContinue }
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          
          echo "RDP_USERNAME=RDP" >> $env:GITHUB_ENV
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV
          Write-Host "User RDP created"

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force
          Write-Host "Tailscale installed"

      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          if (-not $tsIP) { Write-Error "Tailscale IP not assigned"; exit 1 }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "Tailscale IP: $tsIP"

      - name: Install and Configure 3proxy Directly
        run: |
          Write-Host "Starting 3proxy installation..."
          
          $proxyDir = "C:\3proxy"
          New-Item -Path $proxyDir -ItemType Directory -Force | Out-Null

          # Скачиваем 3proxy с таймаутом
          Write-Host "Downloading 3proxy..."
          $proxyUrl = "https://github.com/z3APA3A/3proxy/releases/download/0.9.4/3proxy-0.9.4.zip"
          $zipPath = "$env:TEMP\3proxy.zip"
          
          try {
              Invoke-WebRequest -Uri $proxyUrl -OutFile $zipPath -UseBasicParsing -TimeoutSec 30
              Write-Host "Download completed"
          } catch {
              Write-Error "Failed to download 3proxy: $_"
              exit 1
          }
          
          Write-Host "Extracting 3proxy..."
          Expand-Archive -Path $zipPath -DestinationPath "$proxyDir\src" -Force
          Remove-Item $zipPath -Force
          
          New-Item -Path "$proxyDir\bin" -ItemType Directory -Force | Out-Null
          Copy-Item "$proxyDir\src\bin\*.*" -Destination "$proxyDir\bin\" -Force
          
          # Генерируем учетные данные
          $proxyUser = "proxyuser"
          $proxyPass = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 12 | ForEach-Object {[char]$_})
          
          Write-Host "Proxy credentials: User=$proxyUser Pass=$proxyPass"
          
          # Создаем конфиг
          $usersLine = "users {0}:CL:{1}" -f $proxyUser, $proxyPass
          $cfgPath = "$proxyDir\3proxy.cfg"
          $configLines = @(
              "nserver 8.8.8.8",
              "nserver 8.8.4.4",
              "nscache 65536",
              "timeouts 1 5 30 60 180 1800 15 60",
              "socks -p1080 -i0.0.0.0",
              "auth strong",
              $usersLine,
              "proxy -p3128 -i0.0.0.0",
              "auth strong",
              $usersLine,
              "allow *",
              "deny * * *"
          )
          $configLines | Set-Content -Path $cfgPath -Encoding ASCII
          
          Write-Host "Config created at $cfgPath"
          Get-Content $cfgPath
          
          # Создаем скрипт в C:/Users/Public для будущего использования
          $publicDir = "C:/Users/Public"
          if (!(Test-Path $publicDir)) { New-Item -Path $publicDir -ItemType Directory -Force | Out-Null }
          
          $scriptContent = @"
          param([string]`$ProxyUser, [string]`$ProxyPass)
          & C:\3proxy\bin\3proxy.exe --install C:\3proxy\3proxy.cfg
          Start-Service -Name "3proxy"
"@
          $scriptContent | Out-File -FilePath "$publicDir/setup-proxy.ps1" -Encoding utf8
          
          # Удаляем старый сервис если есть
          Write-Host "Removing old service if exists..."
          & "$proxyDir\bin\3proxy.exe" --remove 2>$null
          Start-Sleep -Seconds 2
          
          # Устанавливаем сервис
          Write-Host "Installing 3proxy service..."
          $installOutput = & "$proxyDir\bin\3proxy.exe" --install $cfgPath 2>&1
          Write-Host "Install output: $installOutput"
          
          # Запускаем сервис
          Write-Host "Starting 3proxy service..."
          try {
              Start-Service -Name "3proxy" -ErrorAction Stop
              Start-Sleep -Seconds 3
          } catch {
              Write-Error "Failed to start 3proxy service: $_"
              Get-Service -Name "3proxy" -ErrorAction SilentlyContinue | Select-Object Name, Status
              exit 1
          }
          
          # Проверяем статус
          $service = Get-Service -Name "3proxy"
          Write-Host "Service status: $($service.Status)"
          
          if ($service.Status -ne 'Running') {
              Write-Error "3proxy service is not running!"
              exit 1
          }
          
          # Открываем порты в фаерволе
          netsh advfirewall firewall add rule name="Proxy-HTTP-Tailscale" dir=in action=allow protocol=TCP localport=3128
          netsh advfirewall firewall add rule name="Proxy-SOCKS-Tailscale" dir=in action=allow protocol=TCP localport=1080
          
          # Проверяем порты
          Write-Host "Checking listening ports..."
          $socksPort = Get-NetTCPConnection -LocalPort 1080 -ErrorAction SilentlyContinue
          $httpPort = Get-NetTCPConnection -LocalPort 3128 -ErrorAction SilentlyContinue
          
          if ($socksPort) { Write-Host "SOCKS port 1080: OK" }
          else { Write-Error "SOCKS port 1080 not listening"; exit 1 }
          
          if ($httpPort) { Write-Host "HTTP port 3128: OK" }
          else { Write-Error "HTTP port 3128 not listening"; exit 1 }
          
          # Сохраняем переменные
          echo "PROXY_USERNAME=$proxyUser" >> $env:GITHUB_ENV
          echo "PROXY_PASSWORD=$proxyPass" >> $env:GITHUB_ENV
          echo "PROXY_SOCKS_PORT=1080" >> $env:GITHUB_ENV
          echo "PROXY_HTTP_PORT=3128" >> $env:GITHUB_ENV
          
          Write-Host "3proxy setup completed successfully!"

      - name: Verify RDP and Proxy Accessibility
        run: |
          Write-Host "Testing connectivity via Tailscale IP: $env:TAILSCALE_IP"
          
          Write-Host "`nService status:"
          Get-Service -Name "3proxy" | Select-Object Name, Status, StartType
          
          Write-Host "`nListening ports:"
          Get-NetTCPConnection -LocalPort 1080,3128,3389 -ErrorAction SilentlyContinue | Select-Object LocalAddress, LocalPort, State
          
          Write-Host "`nTesting RDP (3389)..."
          $rdpTest = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 -WarningAction SilentlyContinue
          if ($rdpTest.TcpTestSucceeded) { Write-Host "✓ RDP: OK" }
          else { Write-Error "✗ RDP port 3389 unreachable"; exit 1 }
          
          Write-Host "Testing SOCKS5 (1080)..."
          $socksTest = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 1080 -WarningAction SilentlyContinue
          if ($socksTest.TcpTestSucceeded) { Write-Host "✓ SOCKS5 Proxy: OK" }
          else { Write-Error "✗ SOCKS proxy port 1080 unreachable"; exit 1 }
          
          Write-Host "Testing HTTP (3128)..."
          $httpTest = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3128 -WarningAction SilentlyContinue
          if ($httpTest.TcpTestSucceeded) { Write-Host "✓ HTTP Proxy: OK" }
          else { Write-Error "✗ HTTP proxy port 3128 unreachable"; exit 1 }
          
          Write-Host "`nAll tests passed!"

      - name: Output Connection Details
        run: |
          Write-Host "`n========================================"
          Write-Host "   RDP + PROXY ACCESS INFORMATION"
          Write-Host "========================================`n"
          Write-Host "Tailscale IP: $env:TAILSCALE_IP`n"
          Write-Host "RDP Credentials:"
          Write-Host "  Username: RDP"
          Write-Host "  Password: $env:RDP_PASSWORD`n"
          Write-Host "Proxy Credentials:"
          Write-Host "  SOCKS5: $env:TAILSCALE_IP:$env:PROXY_SOCKS_PORT"
          Write-Host "  HTTP/S: $env:TAILSCALE_IP:$env:PROXY_HTTP_PORT"
          Write-Host "  Username: $env:PROXY_USERNAME"
          Write-Host "  Password: $env:PROXY_PASSWORD`n"
          Write-Host "Usage examples:"
          Write-Host "  curl --proxy socks5h://$env:PROXY_USERNAME:$env:PROXY_PASSWORD@$env:TAILSCALE_IP:$env:PROXY_SOCKS_PORT https://api.ipify.org"
          Write-Host "  curl --proxy http://$env:PROXY_USERNAME:$env:PROXY_PASSWORD@$env:TAILSCALE_IP:$env:PROXY_HTTP_PORT https://api.ipify.org"
          Write-Host "  RDP: mstsc /v:$env:TAILSCALE_IP`n"
          Write-Host "========================================"

      - name: Keep-Alive (Optional - 5 minutes max)
        run: |
          Write-Host "Keeping session active for 5 minutes..."
          $endTime = (Get-Date).AddMinutes(5)
          while ((Get-Date) -lt $endTime) {
              $service = Get-Service -Name "3proxy" -ErrorAction SilentlyContinue
              if ($service -and $service.Status -ne 'Running') {
                  Write-Warning "3proxy not running, restarting..."
                  Start-Service -Name "3proxy" -ErrorAction SilentlyContinue
              }
              Write-Host "[$(Get-Date)] Active — IP: $env:TAILSCALE_IP"
              Start-Sleep -Seconds 60
          }
          Write-Host "Keep-alive period ended"
